media:
  input: assets/images
  output: /assets/images

content:
  - name: posts
    label: Blog Posts
    type: collection
    folder: _posts
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: date
        label: Date
        type: datetime
      - name: image
        label: Featured Image
        type: image
      - name: body
        label: Content
        type: rich-text

  - name: library
    label: Library Items
    type: collection
    folder: _library
    fields:
      - name: title
        label: Book / Document Title
        type: string
        required: true
      - name: author
        label: Author
        type: string
      - name: file
        label: Attachment (PDF/Doc)
        type: file
      - name: body
        label: Description
        type: rich-text

  - name: gallery
    label: Gallery Photos
    type: collection
    folder: _gallery
    fields:
      - name: title
        label: Photo Title
        type: string
      - name: image
        label: Upload Photo
        type: image
        required: true

- name: home
    label: Home Page
    type: file
    path: index.md
    fields:
      - name: layout
        label: Layout (Do not touch)
        type: string
      - name: title
        label: Title
        type: string
      - name: body
        label: Content
        type: rich-text
